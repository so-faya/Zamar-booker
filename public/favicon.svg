    letter-spacing="-1">Zamar</text>

  <!-- Orange layer -->
  <text x="50" y="68"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-style="italic"
    font-weight="900"
    font-size="48"
    stroke="#e85c00"
