<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark circular background -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a"/>

  <!-- Leaf -->
  <path d="M 62 22 Q 72 12 82 10 Q 81 18 74 24 Q 69 28 64 30 Z" fill="#2d6a1f"/>
  <path d="M 63 24 Q 76 10 84 10 Q 82 16 74 22 Q 69 26 65 30 Z" fill="#4ea832"/>
  <path d="M 63.5 25 Q 75 12 83 10" fill="none" stroke="#2d6a1f" stroke-width="0.8" stroke-linecap="round"/>

  <!-- White sticker border -->
  <text x="50" y="68"
